<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>灵枢台 · 全息中控</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; font-family: 'Songti SC', 'STSong', serif; }
  canvas { display: block; }
  #hud { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
  #hud-top { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); }
  .hud-panel {
    background: rgba(10,10,10,0.7); border: 1px solid rgba(180,180,180,0.25);
    border-radius: 2px; padding: 12px 18px; color: #ccc;
    font-size: 13px; letter-spacing: 2px; backdrop-filter: blur(4px);
  }
  .hud-panel .label { color: rgba(180,180,180,0.5); font-size: 10px; letter-spacing: 3px; }
  .hud-panel .value { font-size: 18px; font-weight: normal; color: #eee; }
  #hud-left { position: fixed; bottom: 36px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; gap: 10px; z-index: 10; pointer-events: none; }
  #hud-left #cmd-line { pointer-events: all; }
  #scanlines {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 1;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
  }
  #cmd-line {
    z-index: 30; pointer-events: all; display: flex; flex-direction: column; gap: 10px;
    width: 420px; max-width: 90vw;
  }
  #cmd-row {
    display: flex; align-items: center; gap: 8px;
    background: rgba(15,15,15,0.85); border: 1px solid rgba(200,200,200,0.3);
    border-radius: 2px; padding: 9px 16px;
  }
  #cmd-row .prompt { color: #999; font-size: 13px; }
  #cmd-row input {
    background: transparent; border: none; outline: none;
    color: #ddd; font-family: 'Songti SC', 'STSong', serif;
    font-size: 13px; flex: 1; letter-spacing: 2px;
    min-width: 0;
  }
  #cmd-row input::placeholder { color: rgba(180,180,180,0.25); }
  #cmd-result {
    background: rgba(15,15,15,0.85); border: 1px solid rgba(200,200,200,0.2);
    border-radius: 2px; padding: 14px 18px;
    max-height: 260px; overflow-y: auto;
    display: none;
    font-size: 13px; line-height: 1.8; letter-spacing: 1px;
    color: #ccc; white-space: pre-wrap; word-break: break-word;
  }
  #cmd-result.show { display: block; }
  #cmd-result .loading {
    color: rgba(180,180,180,0.5);
    animation: pulse-text 1.5s ease-in-out infinite;
  }
  #cmd-result .error { color: #b88; }
  #cmd-result .heading { color: #aaa; font-size: 11px; letter-spacing: 3px; margin-bottom: 4px; }
  @keyframes pulse-text {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 1; }
  }
  .notification {
    position: fixed; top: 90px; right: 28px;
    background: rgba(20,20,20,0.9); border: 1px solid rgba(200,200,200,0.3);
    color: #ccc; padding: 12px 20px; border-radius: 2px;
    font-size: 13px; z-index: 25; pointer-events: none;
    opacity: 0; transform: translateY(-10px); transition: all 0.6s ease;
  }
  .notification.show { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>
<div id="scanlines"></div>
<div id="hud">
  <div id="hud-top">
    <div class="hud-panel"><div class="label">灵 枢 台</div><div class="value" id="time-display">--:--:--</div></div>
  </div>
  <div id="hud-left">
    <div class="hud-panel">
      <div class="label" id="almanac-label">丙午年 · 水运太过 · 少阴君火司天</div>
      <div style="color:#aaa;font-size:12px;letter-spacing:2px;" id="almanac-detail">三之气 · 小满 · 斗指巳</div>
    </div>
    <div id="cmd-line">
      <div id="cmd-row">
        <span class="prompt">道</span>
        <input type="text" id="cmd-input" placeholder="输入指令..." autofocus>
      </div>
      <div id="cmd-result"></div>
    </div>
  </div>
</div>
<div class="notification" id="notification"></div>

<script type="importmap">
{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { AfterimagePass } from 'three/addons/postprocessing/AfterimagePass.js';

// ══════════════════════════════════════════
// 全局配置（修改参数统一在此）
// ══════════════════════════════════════════
const CONFIG = {
  particle: { count: 33333, minR: 3, maxR: 15, size: 0.06, opacity: 0.95 },
  camera:  { pos: [0, 0.5, 16], fov: 60 },
  controls:{ minDist: 5, maxDist: 35, autoRotate: 0.2 },
  bloom:   { threshold: 0.15, strength: 0.7, radius: 0.5 },
  beidou:  { orbitY: 0.12, orbitX: 0.008, ringSpin: 0.4 },
  flow:    { waveSpeed: 0.12, flattenMax: 0.75, omegaBase: 0.15, omegaRange: 0.6 },
};

// ══════════════════════════════════════════
// SCENE · CAMERA · RENDERER
// ══════════════════════════════════════════
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x000000, 0.000008);

const camera = new THREE.PerspectiveCamera(CONFIG.camera.fov, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(...CONFIG.camera.pos);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
document.body.appendChild(renderer.domElement);

// ══════════════════════════════════════════
// POST-PROCESSING
// ══════════════════════════════════════════
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.5, 0.4, 0.85);
bloomPass.threshold = CONFIG.bloom.threshold;
bloomPass.strength  = CONFIG.bloom.strength;
bloomPass.radius    = CONFIG.bloom.radius;
composer.addPass(bloomPass);
const afterimagePass = new AfterimagePass(0.1);
afterimagePass.uniforms['damp'].value = 0.94;
composer.addPass(afterimagePass);

// ══════════════════════════════════════════
// CONTROLS
// ══════════════════════════════════════════
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = CONFIG.controls.minDist;
controls.maxDistance = CONFIG.controls.maxDist;
controls.maxPolarAngle = Math.PI * 0.7;
controls.autoRotate = true;
controls.autoRotateSpeed = CONFIG.controls.autoRotate;
controls.target.set(0, 0, 0);

// ══════════════════════════════════════════
// LIGHTING
// ══════════════════════════════════════════
scene.add(new THREE.AmbientLight(0x222222, 0.5));
const ptLight = new THREE.PointLight(0xffffff, 0.6, 25);
ptLight.position.set(0, 5, 5);
scene.add(ptLight);

// ══════════════════════════════════════════
// 粒子系统（33333 · 无极⇄太极连续流场）
// ══════════════════════════════════════════
const N = CONFIG.particle.count;
const qiGeom = new THREE.BufferGeometry();
const qiPos  = new Float32Array(N * 3);
const qiCol  = new Float32Array(N * 3);
const qiData = [];

for (let i = 0; i < N; i++) {
  const r  = CONFIG.particle.minR + Math.pow(Math.random(), 0.5) * (CONFIG.particle.maxR - CONFIG.particle.minR);
  const th = Math.random() * Math.PI * 2;
  const ph = (Math.random() - 0.5) * Math.PI * 1.4;
  qiPos[i*3]   = r * Math.cos(ph) * Math.cos(th);
  qiPos[i*3+1] = r * Math.sin(ph);
  qiPos[i*3+2] = r * Math.cos(ph) * Math.sin(th);
  qiCol[i*3] = qiCol[i*3+1] = qiCol[i*3+2] = 0.5;
  qiData[i] = {
    r, th, ph,
    omega: CONFIG.flow.omegaBase + Math.random() * CONFIG.flow.omegaRange,
    drift: (Math.random() - 0.5) * 0.3,
  };
}

qiGeom.setAttribute('position', new THREE.BufferAttribute(qiPos, 3));
qiGeom.setAttribute('color',    new THREE.BufferAttribute(qiCol, 3));
const qiCloud = new THREE.Points(qiGeom, new THREE.PointsMaterial({
  size: CONFIG.particle.size,
  vertexColors: true,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
  transparent: true,
  opacity: CONFIG.particle.opacity,
}));
scene.add(qiCloud);

function updateQiParticles(dt, tm) {
  const wave = Math.sin(tm * CONFIG.flow.waveSpeed) * 0.5 + 0.5;
  const flatten = wave * CONFIG.flow.flattenMax;

  for (let i = 0; i < N; i++) {
    const d = qiData[i];
    d.th += d.omega * dt * (1 - flatten * 0.4);
    if (d.th > Math.PI * 2) d.th -= Math.PI * 2;

    const r  = d.r + Math.sin(tm * 0.6 + d.ph) * d.drift;
    const yh = r * Math.sin(d.ph) * (1 - flatten);
    const hr = r * Math.cos(d.ph);

    qiPos[i*3]   = hr * Math.cos(d.th);
    qiPos[i*3+1] = yh;
    qiPos[i*3+2] = hr * Math.sin(d.th);

    const dist = r / CONFIG.particle.maxR;
    const b = 0.08 + (1 - dist) * 0.65;
    qiCol[i*3] = qiCol[i*3+1] = qiCol[i*3+2] = b;
  }
  qiGeom.attributes.position.needsUpdate = true;
  qiGeom.attributes.color.needsUpdate = true;
}

// ══════════════════════════════════════════
// 北斗七星功能节点（绕北极旋转）
// ══════════════════════════════════════════
const beidouGroup = new THREE.Group();
const beidouNodes = [];

const BEIDOU = [
  { name: '天枢·辨证', pos: [1.2, 0.8, 3.5],   size: 0.30, color: 0xffffff },
  { name: '天璇·方剂', pos: [-0.2, 0.4, 3.2],  size: 0.28, color: 0xeeeeee },
  { name: '天玑·运气', pos: [-1.5, 0.2, 2.5],  size: 0.26, color: 0xdddddd },
  { name: '天权·针灸', pos: [-2.2, -0.2, 1.5], size: 0.22, color: 0xcccccc },
  { name: '玉衡·医案', pos: [-2.5, -0.6, 0.2], size: 0.28, color: 0xeeeeee },
  { name: '摇光·系统', pos: [-1.5, -1.8, -2.5],size: 0.30, color: 0xffffff },
];
const BEIDOU_IDS = ['bianzheng', 'fangji', 'wuyun', 'zhenjiu', 'yian', 'system'];
const BEIDOU_LINES = [[0,1],[1,2],[2,3],[3,4],[4,5]];

BEIDOU.forEach((bp, i) => {
  const g = new THREE.Group();
  g.position.set(...bp.pos);
  g.userData = { id: BEIDOU_IDS[i], label: bp.name };

  g.add(new THREE.Mesh(
    new THREE.SphereGeometry(bp.size, 24, 24),
    new THREE.MeshBasicMaterial({ color: bp.color, blending: THREE.AdditiveBlending, depthWrite: false, transparent: true, opacity: 0.85 })
  ));
  g.add(new THREE.Mesh(
    new THREE.SphereGeometry(bp.size * 3, 16, 16),
    new THREE.MeshBasicMaterial({ color: bp.color, blending: THREE.AdditiveBlending, depthWrite: false, transparent: true, opacity: 0.1 })
  ));
  g.add(new THREE.Mesh(
    new THREE.TorusGeometry(bp.size * 1.6, 0.012, 8, 32),
    new THREE.MeshBasicMaterial({ color: bp.color, blending: THREE.AdditiveBlending, depthWrite: false, transparent: true, opacity: 0.3 })
  ));

  beidouGroup.add(g);
  beidouNodes.push(g);
});

// 连线
BEIDOU_LINES.forEach(([a, b]) => {
  const pts = [BEIDOU[a].pos, BEIDOU[b].pos].map(p => new THREE.Vector3(...p));
  beidouGroup.add(new THREE.Line(
    new THREE.BufferGeometry().setFromPoints(pts),
    new THREE.LineBasicMaterial({ color: 0x888888, transparent: true, opacity: 0.35, blending: THREE.AdditiveBlending, depthWrite: false })
  ));
});

// 北极星→天枢
beidouGroup.add(new THREE.Line(
  new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0, 0, 0), new THREE.Vector3(...BEIDOU[0].pos)]),
  new THREE.LineDashedMaterial({ color: 0x555555, transparent: true, opacity: 0.2, dashSize: 0.4, gapSize: 0.3 })
));

scene.add(beidouGroup);

// ══════════════════════════════════════════
// 无极中心（北极星）
// ══════════════════════════════════════════
const wujiCore = new THREE.Mesh(
  new THREE.SphereGeometry(0.2, 32, 32),
  new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.6, blending: THREE.AdditiveBlending, depthWrite: false })
);
const wujiGlow = new THREE.Mesh(
  new THREE.SphereGeometry(0.8, 32, 32),
  new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.06, blending: THREE.AdditiveBlending, depthWrite: false })
);
const wujiGroup = new THREE.Group();
wujiGroup.add(wujiCore);
wujiGroup.add(wujiGlow);
scene.add(wujiGroup);

// ══════════════════════════════════════════
// HUD
// ══════════════════════════════════════════
const XIAOMAN_2026 = new Date(2026, 4, 21); // 2026-05-21 小满

function updateHUD() {
  const now = new Date();
  document.getElementById('time-display').textContent = now.toLocaleTimeString('zh-CN', { hour12: false });

  const daysFromXiaoman = Math.floor((now - XIAOMAN_2026) / 86400000);
  document.getElementById('almanac-label').textContent  = '丙午年 · 水运太过 · 少阴君火司天';
  document.getElementById('almanac-detail').textContent = `三之气 · 小满第${daysFromXiaoman + 1}日 · 斗指巳`;
}

// ══════════════════════════════════════════
// NOTIFICATIONS
// ══════════════════════════════════════════
let notifTimer;
function notify(msg) {
  const el = document.getElementById('notification');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(notifTimer);
  notifTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

// ══════════════════════════════════════════
// INTERACTION
// ══════════════════════════════════════════
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

renderer.domElement.addEventListener('click', e => {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(beidouNodes, true);
  if (hits.length > 0) {
    let obj = hits[0].object;
    while (obj && !obj.userData.id) obj = obj.parent;
    if (obj?.userData.id) notify(`⭐ ${obj.userData.label} · 已激活`);
  }
});

// ══════════════════════════════════════════
// 命令系统（桥接 OpenClaw）
// ══════════════════════════════════════════
const cmdInput = document.getElementById('cmd-input');
const cmdResult = document.getElementById('cmd-result');
let cmdHistory = [];
let cmdHistoryIdx = -1;
let isProcessing = false;

function showResult(html, cls) {
  cmdResult.className = 'show' + (cls ? ' ' + cls : '');
  cmdResult.innerHTML = html;
  cmdResult.scrollTop = 0;
}

function hideResult() {
  cmdResult.className = '';
  cmdResult.innerHTML = '';
}

async function sendCommand(message) {
  if (isProcessing) return;
  isProcessing = true;
  cmdInput.disabled = true;

  // 加入历史
  cmdHistory.push(message);
  cmdHistoryIdx = cmdHistory.length;

  showResult(`<div class="heading">指令</div>${escapeHtml(message)}<br><br><span class="loading">⏳ 灵枢台辨证中...</span>`);
  notify('🔮 灵枢台启动中...');

  const startTime = Date.now();
  try {
    const resp = await fetch('/api/command', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message }),
    });
    const data = await resp.json();
    const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);

    if (data.error) {
      showResult(
        `<div class="heading">指令</div>${escapeHtml(message)}<br><br><span class="error">⚠ 错误：${escapeHtml(data.error)}</span>`,
        'error'
      );
      notify('⚠ 指令执行失败');
    } else {
      const duration = data.meta?.durationMs ? ` (${(data.meta.durationMs / 1000).toFixed(1)}s)` : '';
      showResult(
        `<div class="heading">指令</div>${escapeHtml(message)}<br><br><div class="heading">灵枢台 · 应答${duration}</div>${escapeHtml(data.text)}`
      );
      notify('✅ 辨证完成');
    }
  } catch (err) {
    showResult(
      `<div class="heading">指令</div>${escapeHtml(message)}<br><br><span class="error">⚠ 连接失败：${escapeHtml(err.message)}</span>`,
      'error'
    );
    notify('⚠ 连接桥接服务失败');
  } finally {
    isProcessing = false;
    cmdInput.disabled = false;
    cmdInput.focus();
  }
}

function escapeHtml(s) {
  const div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

cmdInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const cmd = cmdInput.value.trim();
    cmdInput.value = '';
    if (!cmd || isProcessing) return;
    sendCommand(cmd);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (cmdHistoryIdx > 0) {
      cmdHistoryIdx--;
      cmdInput.value = cmdHistory[cmdHistoryIdx];
    }
  } else if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (cmdHistoryIdx < cmdHistory.length - 1) {
      cmdHistoryIdx++;
      cmdInput.value = cmdHistory[cmdHistoryIdx];
    } else {
      cmdHistoryIdx = cmdHistory.length;
      cmdInput.value = '';
    }
  } else if (e.key === 'Escape') {
    hideResult();
  }
});

// ══════════════════════════════════════════
// ANIMATION LOOP
// ══════════════════════════════════════════
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.1);
  const tm = performance.now() * 0.001;

  controls.update();

  // 粒子流场
  updateQiParticles(dt, tm);

  // 北斗绕极
  beidouGroup.rotation.y += dt * CONFIG.beidou.orbitY;
  beidouGroup.rotation.x += dt * CONFIG.beidou.orbitX;

  // 七星环自转
  beidouNodes.forEach(n =>
    n.children.forEach(c => {
      if (c.geometry?.type === 'TorusGeometry') c.rotation.z += dt * CONFIG.beidou.ringSpin;
    })
  );

  // 无极脉动
  const pulse = 1 + Math.sin(tm * 1.5) * 0.15;
  wujiCore.scale.setScalar(pulse);
  wujiGlow.scale.setScalar(pulse * 1.3);

  // HUD 每秒更新
  if (Math.floor(tm) !== Math.floor(tm - dt)) updateHUD();

  composer.render();
}

updateHUD();
animate();
setTimeout(() => notify('🌌 三万三千三百三十三粒子 · 无极⇄太极 · 中控就绪'), 800);

// ══════════════════════════════════════════
// EVENTS
// ══════════════════════════════════════════
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  composer.setSize(window.innerWidth, window.innerHeight);
});

window.addEventListener('keydown', e => {
  if (e.key === 'f' && !e.target.closest('input')) {
    controls.target.set(0, 0, 0);
    camera.position.set(...CONFIG.camera.pos);
  }
  if (e.key === 'r' && !e.target.closest('input')) {
    controls.autoRotate = !controls.autoRotate;
    notify(controls.autoRotate ? '🔄 自动旋转：开' : '🔒 自动旋转：关');
  }
});
</script>
</body>
</html>
